services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: migration_foreman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d migration_foreman"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    working_dir: /app
    volumes:
      - ./server:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/migration_foreman
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:8000/github/callback}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:-}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-720}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5-codex}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      MOCK_CODEX: ${MOCK_CODEX:-0}
      FRONTEND_BASE_URL: http://localhost:3000
      # Keep runtime clones/worktrees OUT of /app: uvicorn --reload watches
      # /app and would restart (killing campaigns) on every git write.
      DATA_DIR: /data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/app
    environment:
      NEXT_PUBLIC_BACKEND_BASE_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:

# The default bridge inherits the host's 1500 MTU, but the Docker Desktop /
# WSL2 path to the internet can't carry full-size frames and PMTU discovery is
# blackholed — so small requests succeed while large transfers (git clone pack
# data, TLS cert exchange, Google-Font .woff2 downloads) stall and time out.
# Clamping the network MTU to 1400 makes every packet fit end to end.
# Apply with `docker compose down && docker compose up -d` (recreates the net).
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
